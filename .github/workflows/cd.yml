name: Build and push Docker image on commit to main
 
on:
    push:
        branches: [ main ]
 
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
 
      - name: Build Docker Image
        run: docker build -t capops/processor:latest .
 
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
 
      - name: Push Docker Image
        run: docker push capops/processor:latest
 
      - name: Deploy to Remote Server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: 22
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker pull capops/processor:latest
            docker stop processor || true
            docker rm processor || true
            docker run -d \
                --name processor \
                --network capops-network \
                -e REDIS_HOST=redis \
                -e REDIS_PORT=6379 \
                capops/processor:latest